# Sobe Postgres + Redis locais para desenvolvimento.
# Uso: docker compose up -d
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bufalo
      POSTGRES_USER: bufalo
      POSTGRES_PASSWORD: bufalo
    ports:
      - "5432:5432"
    volumes:
      - bufalo_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  bufalo_pgdata:
